databases:
  - name: financecontrol-db
    plan: free
    databaseName: financecontrol
    user: fcadmin

services:
  - type: web
    name: financecontrol
    runtime: python
    plan: free
    buildCommand: "chmod +x render-build.sh && ./render-build.sh"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financecontrol-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_EXPIRE_HOURS
        value: 48
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: NODE_VERSION
        value: 20.18.0
      - key: ENVIRONMENT
        value: production
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        value: REDACTED_EMAIL
      - key: SMTP_PASS
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://financecontrol-kiyl.onrender.com
      - key: ADMIN_LOGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
